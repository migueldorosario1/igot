<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8553d"/>
      <stop offset="100%" stop-color="#e8a03d"/>
    </linearGradient>
    <linearGradient id="bulb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="100%" stop-color="#ffe9c4"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado com o gradiente da marca -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Lâmpada (contorno + preenchimento suave) -->
  <g transform="translate(256 256)">
    <!-- base/rosca da lâmpada -->
    <rect x="-34" y="120" width="68" height="20" rx="8" fill="#3a2418"/>
    <rect x="-28" y="144" width="56" height="14" rx="6" fill="#3a2418"/>
    <rect x="-20" y="162" width="40" height="10" rx="5" fill="#3a2418"/>

    <!-- bulbo -->
    <path d="M -90 -30
             C -90 -110, -40 -160, 0 -160
             C 40 -160, 90 -110, 90 -30
             C 90 30, 60 80, 40 120
             L -40 120
             C -60 80, -90 30, -90 -30 Z"
          fill="url(#bulb)" stroke="#3a2418" stroke-width="10"/>

    <!-- filamento (formando um "i" estilizado = igot) -->
    <line x1="0" y1="-90" x2="0" y2="20" stroke="#3a2418" stroke-width="12" stroke-linecap="round"/>
    <circle cx="0" cy="-110" r="10" fill="#3a2418"/>

    <!-- brilho -->
    <circle cx="-40" cy="-80" r="14" fill="#ffffff" opacity="0.7"/>
  </g>
</svg>
